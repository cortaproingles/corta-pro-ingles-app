name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/network/setup-node@v4  # Nota: Ou mantendo o setup-node padrão que já estava aí
        with:
          node-version: '22'

      - name: Install Dependencies and Build
        run: |
          rm -f package-lock.json
          npm install
          npm run build

      - name: Build Web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Sync and Add Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/app
          npx cap init "Corta pra Ingles" "com.cortaproingles.app" --web-dir=dist
          npm install @capacitor/android
          npx cap add android
          npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
